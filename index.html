<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Mini Golf Scorecard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛳</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Bangers&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Fredoka', sans-serif; background: linear-gradient(145deg, #0d1b2a 0%, #1b2838 50%, #0d1b2a 100%); min-height: 100vh; -webkit-tap-highlight-color: transparent; }
    button { font-family: 'Fredoka', sans-serif; cursor: pointer; border: none; outline: none; }
    input { font-family: 'Fredoka', sans-serif; outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script>
    const { useState, useEffect, createElement: h } = React;

    const DEFAULT_PAR = 3;
    const COLORS = ["#FF6B6B","#4ECDC4","#FFE66D","#A8E6CF","#FF8B94","#7EC8E3","#C9B1FF","#FFB347"];
    const color = i => COLORS[i % COLORS.length];
    const fmtRel = n => n === 0 ? "E" : n > 0 ? "+" + n : "" + n;

    const STORAGE_KEY = "minigolf_state";
    const saveState = state => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} };
    const loadState = () => { try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : null; } catch(e) { return null; } };
    const clearState = () => { try { localStorage.removeItem(STORAGE_KEY); } catch(e) {} };

    function App() {
      const saved = loadState();
      const [phase, setPhase] = useState(saved?.phase || "setup");
      const [players, setPlayers] = useState(saved?.players || ["", ""]);
      const [scores, setScores] = useState(saved?.scores || {});
      const [hole, setHole] = useState(saved?.hole || 1);
      const [numHoles, setNumHoles] = useState(saved?.numHoles || 18);
      const [holePars, setHolePars] = useState(saved?.holePars || Array(18).fill(DEFAULT_PAR));

      useEffect(() => {
        saveState({ phase, players, scores, hole, numHoles, holePars });
      }, [phase, players, scores, hole, numHoles, holePars]);

      const addPlayer = () => players.length < 6 && setPlayers([...players, ""]);
      const removePlayer = i => players.length > 2 && setPlayers(players.filter((_, idx) => idx !== i));
      const updateName = (i, name) => { const n = [...players]; n[i] = name; setPlayers(n); };

      const startGame = () => {
        const named = players.map((p, i) => p.trim() || "Player " + (i + 1));
        setPlayers(named);
        const init = {};
        named.forEach(p => { init[p] = Array(numHoles).fill(null); });
        setScores(init);
        setPhase("play");
      };

      const setScore = (player, h, strokes) => {
        setScores(prev => {
          const next = { ...prev };
          next[player] = [...prev[player]];
          next[player][h - 1] = strokes;
          return next;
        });
      };

      const total = p => (scores[p] || []).reduce((a, b) => a + (b || 0), 0);
      const totalPar = () => holePars.slice(0, numHoles).reduce((a, b) => a + b, 0);
      const rel = p => { let t = 0; (scores[p] || []).forEach((s, i) => { if (s !== null) t += s - holePars[i]; }); return t; };
      const allScored = () => players.every(p => scores[p]?.[hole - 1] != null);
      const leader = () => { const s = players.filter(p => total(p) > 0); return s.length ? s.reduce((a, b) => total(a) <= total(b) ? a : b) : null; };

      const newGame = () => {
        clearState();
        setPhase("setup"); setScores({}); setHole(1);
        setPlayers(["", ""]); setNumHoles(18); setHolePars(Array(18).fill(DEFAULT_PAR));
      };

      // ─── SETUP ───
      if (phase === "setup") {
        return h("div", { style: { minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 } },
          h("div", { style: { width: "100%", maxWidth: 420 } },
            // Title
            h("div", { style: { textAlign: "center", marginBottom: 36 } },
              h("div", { style: { fontSize: 48, marginBottom: 4 } }, "⛳"),
              h("h1", { style: { fontFamily: "'Bangers', cursive", fontSize: 42, color: "#FFE66D", margin: 0, letterSpacing: 2, textShadow: "3px 3px 0 #FF6B6B" } }, "MINI GOLF"),
              h("p", { style: { color: "#7ec8e3", fontSize: 16, margin: "4px 0 0" } }, "Scorecard")
            ),
            // Card
            h("div", { style: { background: "rgba(255,255,255,0.07)", borderRadius: 20, padding: 24, backdropFilter: "blur(10px)", border: "1px solid rgba(255,255,255,0.1)" } },
              // Hole count
              h("div", { style: { marginBottom: 20 } },
                h("label", { style: { color: "#aaa", fontSize: 13, fontWeight: 600 } }, "NUMBER OF HOLES"),
                h("div", { style: { display: "flex", alignItems: "center", gap: 10, marginTop: 8 } },
                  h("button", { onClick: () => { const n = Math.max(1, numHoles - 1); setNumHoles(n); setHolePars(prev => prev.slice(0, n)); }, style: { width: 44, height: 44, borderRadius: 12, background: "rgba(255,255,255,0.1)", color: "#fff", fontSize: 22, fontWeight: 700 } }, "−"),
                  h("div", { style: { flex: 1, textAlign: "center", fontSize: 28, fontWeight: 700, color: "#4ECDC4" } }, numHoles),
                  h("button", { onClick: () => { const n = Math.min(36, numHoles + 1); setNumHoles(n); setHolePars(prev => prev.length < n ? [...prev, DEFAULT_PAR] : prev); }, style: { width: 44, height: 44, borderRadius: 12, background: "rgba(255,255,255,0.1)", color: "#fff", fontSize: 22, fontWeight: 700 } }, "+")
                )
              ),
              // Par per hole
              h("div", { style: { marginBottom: 20 } },
                h("label", { style: { color: "#aaa", fontSize: 13, fontWeight: 600 } }, "PAR PER HOLE"),
                h("div", { style: { display: "flex", flexWrap: "wrap", gap: 6, marginTop: 8 } },
                  ...holePars.slice(0, numHoles).map((p, i) =>
                    h("div", { key: i, style: { display: "flex", flexDirection: "column", alignItems: "center", gap: 2 } },
                      h("span", { style: { color: "#666", fontSize: 10, fontWeight: 600 } }, i + 1),
                      h("button", {
                        onClick: () => setHolePars(prev => { const n = [...prev]; n[i] = n[i] >= 5 ? 2 : n[i] + 1; return n; }),
                        style: { width: 36, height: 36, borderRadius: 8, background: p===3?"rgba(78,205,196,0.25)":p===4?"rgba(255,230,109,0.2)":p===5?"rgba(255,107,107,0.2)":"rgba(255,255,255,0.08)", color: p===3?"#4ECDC4":p===4?"#FFE66D":p===5?"#FF6B6B":"#aaa", fontSize: 16, fontWeight: 700 }
                      }, p)
                    )
                  )
                ),
                h("p", { style: { color: "#666", fontSize: 11, marginTop: 6 } }, "Tap to cycle: 2 → 3 → 4 → 5")
              ),
              // Players
              h("label", { style: { color: "#aaa", fontSize: 13, fontWeight: 600 } }, "PLAYERS"),
              h("div", { style: { display: "flex", flexDirection: "column", gap: 10, marginTop: 8 } },
                ...players.map((p, i) =>
                  h("div", { key: i, style: { display: "flex", alignItems: "center", gap: 8 } },
                    h("div", { style: { width: 36, height: 36, borderRadius: "50%", background: color(i), display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 700, color: "#1a1a2e", flexShrink: 0 } }, i + 1),
                    h("input", { value: p, onChange: e => updateName(i, e.target.value), placeholder: "Player " + (i + 1), style: { flex: 1, padding: "10px 14px", borderRadius: 10, border: "none", background: "rgba(255,255,255,0.1)", color: "#fff", fontSize: 16 } }),
                    players.length > 2 && h("button", { onClick: () => removePlayer(i), style: { width: 32, height: 32, borderRadius: "50%", background: "rgba(255,100,100,0.2)", color: "#FF6B6B", fontSize: 18 } }, "×")
                  )
                )
              ),
              players.length < 6 && h("button", { onClick: addPlayer, style: { width: "100%", marginTop: 10, padding: "10px 0", borderRadius: 10, border: "2px dashed rgba(255,255,255,0.2)", background: "transparent", color: "#7ec8e3", fontSize: 15 } }, "+ Add Player"),
              h("button", { onClick: startGame, style: { width: "100%", marginTop: 20, padding: "14px 0", borderRadius: 14, background: "linear-gradient(135deg, #FFE66D, #FFB347)", color: "#1a1a2e", fontSize: 20, fontWeight: 700, fontFamily: "'Bangers', cursive", letterSpacing: 2 } }, "TEE OFF ⛳")
            )
          )
        );
      }

      // ─── SCOREBOARD ───
      if (phase === "scoreboard") {
        const sorted = [...players].sort((a, b) => total(a) - total(b));
        return h("div", { style: { minHeight: "100vh", padding: 20 } },
          h("div", { style: { maxWidth: 480, margin: "0 auto" } },
            h("h1", { style: { fontFamily: "'Bangers', cursive", fontSize: 36, color: "#FFE66D", textAlign: "center", margin: "20px 0 8px", letterSpacing: 2 } }, "🏆 FINAL SCORES"),
            h("p", { style: { textAlign: "center", color: "#7ec8e3", margin: "0 0 24px", fontSize: 14 } }, "Par " + totalPar() + " · " + numHoles + " holes"),
            ...sorted.map((p, i) => {
              const pi = players.indexOf(p);
              const r = rel(p);
              return h("div", { key: p, style: { background: i===0?"linear-gradient(135deg, rgba(255,230,109,0.15), rgba(255,179,71,0.1))":"rgba(255,255,255,0.05)", borderRadius: 16, padding: "16px 20px", marginBottom: 10, display: "flex", alignItems: "center", gap: 14, border: i===0?"2px solid rgba(255,230,109,0.3)":"1px solid rgba(255,255,255,0.08)" } },
                h("div", { style: { fontSize: i===0?32:24, width: 40, textAlign: "center", color: "#aaa" } }, i === 0 ? "👑" : "#" + (i + 1)),
                h("div", { style: { width: 40, height: 40, borderRadius: "50%", background: color(pi), display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, color: "#1a1a2e", fontSize: 16 } }, p[0]),
                h("div", { style: { flex: 1 } }, h("div", { style: { color: "#fff", fontWeight: 600, fontSize: 18 } }, p)),
                h("div", { style: { textAlign: "right" } },
                  h("div", { style: { color: "#FFE66D", fontWeight: 700, fontSize: 28 } }, total(p)),
                  h("div", { style: { color: r <= 0 ? "#4ECDC4" : "#FF6B6B", fontSize: 14, fontWeight: 600 } }, fmtRel(r))
                )
              );
            }),
            h("div", { style: { display: "flex", gap: 10, marginTop: 20 } },
              h("button", { onClick: () => setPhase("play"), style: { flex: 1, padding: "12px 0", borderRadius: 12, border: "2px solid rgba(255,255,255,0.15)", background: "transparent", color: "#7ec8e3", fontSize: 15, fontWeight: 600 } }, "← Edit Scores"),
              h("button", { onClick: newGame, style: { flex: 1, padding: "12px 0", borderRadius: 12, background: "linear-gradient(135deg, #4ECDC4, #7EC8E3)", color: "#1a1a2e", fontSize: 15, fontWeight: 700 } }, "New Game")
            )
          )
        );
      }

      // ─── PLAY ───
      const par = holePars[hole - 1];
      const lead = leader();

      return h("div", { style: { minHeight: "100vh", padding: "12px 16px 100px" } },
        h("div", { style: { maxWidth: 480, margin: "0 auto" } },
          // Header
          h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 } },
            h("div", null,
              h("div", { style: { color: "#aaa", fontSize: 12, fontWeight: 600 } }, "HOLE"),
              h("div", { style: { fontFamily: "'Bangers', cursive", fontSize: 48, color: "#FFE66D", lineHeight: 1 } }, hole)
            ),
            h("button", { onClick: () => setHolePars(prev => { const n = [...prev]; n[hole-1] = n[hole-1] >= 5 ? 2 : n[hole-1] + 1; return n; }), style: { textAlign: "center", background: "none", padding: 0 } },
              h("div", { style: { color: "#aaa", fontSize: 12, fontWeight: 600 } }, "PAR"),
              h("div", { style: { color: "#4ECDC4", fontSize: 32, fontWeight: 700 } }, par),
              h("div", { style: { color: "#555", fontSize: 9, marginTop: 2 } }, "tap to edit")
            ),
            h("button", { onClick: () => setPhase("scoreboard"), style: { padding: "8px 16px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.15)", background: "rgba(255,255,255,0.05)", color: "#7ec8e3", fontSize: 13, fontWeight: 600 } }, "Scoreboard")
          ),
          // Hole nav
          h("div", { style: { display: "flex", gap: 4, marginBottom: 20, overflowX: "auto", paddingBottom: 4 } },
            ...Array.from({ length: numHoles }, (_, i) => i + 1).map(hNum => {
              const done = players.every(p => scores[p]?.[hNum - 1] != null);
              return h("button", { key: hNum, onClick: () => setHole(hNum), style: { minWidth: 32, height: 32, borderRadius: 8, background: hNum===hole?"#FFE66D":done?"rgba(78,205,196,0.25)":"rgba(255,255,255,0.08)", color: hNum===hole?"#1a1a2e":done?"#4ECDC4":"#666", fontSize: 13, fontWeight: 700 } }, hNum);
            })
          ),
          // Players
          ...players.map((p, pi) => {
            const cur = scores[p]?.[hole - 1];
            return h("div", { key: p, style: { background: "rgba(255,255,255,0.05)", borderRadius: 16, padding: "14px 16px", marginBottom: 10, border: "1px solid rgba(255,255,255,0.08)" } },
              h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 } },
                h("div", { style: { display: "flex", alignItems: "center", gap: 10 } },
                  h("div", { style: { width: 30, height: 30, borderRadius: "50%", background: color(pi), display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, color: "#1a1a2e", fontSize: 13 } }, p[0]),
                  h("span", { style: { color: "#fff", fontWeight: 600, fontSize: 16 } }, p),
                  lead === p && total(p) > 0 && h("span", { style: { fontSize: 14 } }, "👑")
                ),
                h("div", { style: { color: "#aaa", fontSize: 13 } },
                  "Total: ",
                  h("span", { style: { color: "#FFE66D", fontWeight: 700 } }, total(p)),
                  " ",
                  h("span", { style: { color: rel(p) <= 0 ? "#4ECDC4" : "#FF6B6B", fontWeight: 600 } }, "(" + fmtRel(rel(p)) + ")")
                )
              ),
              h("div", { style: { display: "flex", gap: 6, flexWrap: "wrap" } },
                ...[1,2,3,4,5,6,7].map(s =>
                  h("button", { key: s, onClick: () => setScore(p, hole, s), style: { width: 44, height: 44, borderRadius: "50%", border: cur===s?"3px solid #1a1a2e":"2px solid #e0e0e0", background: cur===s?"#1a1a2e":"#fff", color: cur===s?"#FFE66D":"#555", fontSize: 18, fontWeight: 700, transition: "all 0.15s ease" } }, s)
                )
              )
            );
          }),
          // Nav
          h("div", { style: { display: "flex", gap: 10, marginTop: 16 } },
            hole > 1 && h("button", { onClick: () => setHole(hole - 1), style: { flex: 1, padding: "14px 0", borderRadius: 14, border: "2px solid rgba(255,255,255,0.12)", background: "transparent", color: "#7ec8e3", fontSize: 16, fontWeight: 600 } }, "← Hole " + (hole - 1)),
            hole < numHoles
              ? h("button", { onClick: () => allScored() && setHole(hole + 1), style: { flex: 1, padding: "14px 0", borderRadius: 14, background: allScored()?"linear-gradient(135deg, #4ECDC4, #7EC8E3)":"rgba(255,255,255,0.08)", color: allScored()?"#1a1a2e":"#555", fontSize: 16, fontWeight: 700, cursor: allScored()?"pointer":"default" } }, "Hole " + (hole + 1) + " →")
              : h("button", { onClick: () => allScored() && setPhase("scoreboard"), style: { flex: 1, padding: "14px 0", borderRadius: 14, background: allScored()?"linear-gradient(135deg, #FFE66D, #FFB347)":"rgba(255,255,255,0.08)", color: allScored()?"#1a1a2e":"#555", fontSize: 16, fontWeight: 700, fontFamily: "'Bangers', cursive", letterSpacing: 2, cursor: allScored()?"pointer":"default" } }, "🏆 FINISH")
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
